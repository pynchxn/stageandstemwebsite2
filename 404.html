<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Stage & Stem</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #08080f;
      color: #f5f2ed;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .logo { width: 120px; max-width: 40vw; margin-bottom: 2.5rem; }

    .eyebrow {
      font-size: 0.58rem;
      letter-spacing: 0.44em;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 1rem;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      margin-bottom: 1.2rem;
    }

    .message {
      font-size: 0.78rem;
      line-height: 2;
      color: rgba(245,242,237,0.5);
      max-width: 460px;
    }

    /* Gold rule divider */
    .rule {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2.2rem auto;
      width: 220px;
    }
    .rule::before, .rule::after { content: ''; flex: 1; height: 1px; }
    .rule::before { background: linear-gradient(to right, transparent, rgba(201,169,110,0.25)); }
    .rule::after  { background: linear-gradient(to left,  transparent, rgba(201,169,110,0.25)); }
    .rule-gem {
      width: 5px; height: 5px;
      background: #c9a96e;
      transform: rotate(45deg);
      opacity: 0.5; flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 0.85rem 2.2rem;
      text-decoration: none;
      color: #c9a96e;
      border: 1px solid rgba(201,169,110,0.25);
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }
    .btn:hover {
      background: rgba(201,169,110,0.08);
      border-color: rgba(201,169,110,0.5);
    }

    .side-links {
      margin-top: 2rem;
      display: flex;
      gap: 1.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }
    .side-links a {
      color: rgba(245,242,237,0.5);
      text-decoration: none;
      transition: color 0.3s;
    }
    .side-links a:hover { color: #c9a96e; }
  </style>
</head>
<body>

  <a href="/index.html"><img class="logo" src="/logo.png" alt="Stage & Stem" /></a>

  <p class="eyebrow">Error 404</p>
  <h1 class="title">Page not found</h1>

  <div class="rule"><div class="rule-gem"></div></div>

  <p class="message">The page you're looking for has moved or no longer exists. Let's get you back on track.</p>

  <div class="rule"><div class="rule-gem"></div></div>

  <a class="btn" href="/index.html">Return Home</a>

  <div class="side-links">
    <a href="/stage.html">Stage</a>
    <a href="/bistro.html">Bistro</a>
  </div>

</body>
</html>
